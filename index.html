<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Nester | Creative Systems Designer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .neon-glow {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .gradient-text {
            background: linear-gradient(to right, #fff, rgba(255, 255, 255, 0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-gradient {
            background: linear-gradient(to right, #06b6d4, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .work-card-overlay {
            background: linear-gradient(to top, rgba(2, 6, 23, 0.9) 0%, rgba(2, 6, 23, 0.4) 50%, transparent 100%);
        }

        .modal-overlay {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            X: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
            ),
            ChevronRight: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            ),
            Play: ({ fill = "none" }) => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            ),
            ArrowRight: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
            ),
            Layout: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
            ),
            Layers: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            ),
            Globe: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            ),
            Palette: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.6-.7 1.6-1.6 0-.4-.2-.8-.5-1.1-.3-.3-.4-.7-.4-1.1 0-.9.7-1.6 1.6-1.6H19c2.8 0 5-2.2 5-5 0-5.5-4.5-10-10-10z"/></svg>
            ),
            Cpu: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
            ),
            User: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ),
            Behance: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12a2 2 0 0 0-2-2H5v4h2a2 2 0 0 0 2-2z"/><path d="M5 10V7h3a2 2 0 0 1 2 2v1"/><path d="M13 14h5"/><path d="M18 11a3 3 0 1 0-6 0v3h6Z"/><path d="M2 13V6h6a4 4 0 0 1 0 8H2Z"/><path d="M14 8h4"/></svg>
            )
        };

        const App = () => {
            const [activeProcess, setActiveProcess] = useState(2);
            const [selectedProject, setSelectedProject] = useState(null);
            const [activeTab, setActiveTab] = useState("Web");

            // Prevent scrolling when modal is open
            useEffect(() => {
                if (selectedProject) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = 'unset';
            }, [selectedProject]);

            const expertise = [
                { title: "UX & Product Design", icon: <Icons.Layout />, color: "text-cyan-400" },
                { title: "Brand Architecture", icon: <Icons.Layers />, color: "text-purple-400" },
                { title: "Web & Digital Systems", icon: <Icons.Globe />, color: "text-blue-400" },
                { title: "Multimedia & Storytelling", icon: <Icons.Palette />, color: "text-pink-400" },
                { title: "AI-Enhanced Workflows", icon: <Icons.Cpu />, color: "text-cyan-500" },
            ];

            const featuredWork = [
                {
                    id: "ucanbe",
                    title: "Ucanbe Cosmetics",
                    subtitle: "E-Commerce System + Brand + Automation",
                    category: "CASE STUDY",
                    color: "from-purple-900/60",
                    isMain: true,
                    details: {
                        challenge: "Ucanbe needed a scalable e-commerce infrastructure that could handle high-volume product drops while maintaining a luxury brand feel.",
                        solution: "Developed a custom headless Shopify system integrated with a unified brand design language and automated inventory workflows.",
                        results: ["45% increase in mobile conversion", "2.1s average load time", "Automated 80% of supply chain updates"]
                    }
                },
                {
                    id: "sams-pizza",
                    title: "Sam's Pizza",
                    subtitle: "Legacy Brand Modernization",
                    color: "from-orange-900/60",
                    isMain: false,
                    details: {
                        challenge: "A 30-year old institution needed to appeal to a younger demographic without alienating its loyal legacy customer base.",
                        solution: "A complete brand refresh centering on heritage storytelling paired with a modern mobile-first ordering app.",
                        results: ["60% growth in online orders", "New visual identity launched globally", "Integrated rewards ecosystem"]
                    }
                },
                {
                    id: "mooniit",
                    title: "Mooniit Magick",
                    subtitle: "Niche Brand Worldbuilding",
                    color: "from-indigo-900/60",
                    isMain: false,
                    details: {
                        challenge: "Creating a cohesive digital world for a boutique wellness brand with a focus on high-touch storytelling.",
                        solution: "Built an immersive WebGL-based product experience that combines e-commerce with interactive narrative elements.",
                        results: ["Average session duration increased by 300%", "98% positive brand sentiment", "Sold out initial launch in 4 hours"]
                    }
                }
            ];

            const galleryCategories = ["Web", "Character", "Brand", "General"];
            
            // Placeholder data for the scalable gallery
            const galleryItems = {
                "Web": [
                    { title: "NextGen Dashboard", desc: "SaaS Interface Design", icon: <Icons.Layout /> },
                    { title: "Fintech App", desc: "Mobile Payment System", icon: <Icons.Layers /> },
                    { title: "Corporate Portal", desc: "Enterprise Solution", icon: <Icons.Globe /> },
                ],
                "Character": [
                    { title: "Cyber-Samurai", desc: "High-Fidelity NPC Concept", icon: <Icons.User /> },
                    { title: "Avatar Generator", desc: "Procedural Character System", icon: <Icons.Cpu /> },
                    { title: "Narrative Mascot", desc: "Brand Storytelling Asset", icon: <Icons.Palette /> },
                ],
                "Brand": [
                    { title: "Aura Identity", desc: "Minimalist Brand System", icon: <Icons.Palette /> },
                    { title: "Vortex Typography", desc: "Custom Brand Font", icon: <Icons.Layers /> },
                    { title: "Brand Guidelines", desc: "Interactive System Doc", icon: <Icons.Layout /> },
                ],
                "General": [
                    { title: "UI Components", icon: <Icons.Layout />, desc: "Design Library" },
                    { title: "Icon Set", icon: <Icons.Layers />, desc: "Systems Thinking" },
                    { title: "Experiment #42", icon: <Icons.Cpu />, desc: "AI Visuals" },
                ]
            };

            const processSteps = ["Discovery", "Strategy", "UX & Design", "Build & Launch", "Optimize"];

            return (
                <div className="min-h-screen relative">
                    {/* Atmospheric Background */}
                    <div className="fixed inset-0 pointer-events-none -z-10">
                        <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-blue-600/10 blur-[150px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-purple-600/10 blur-[150px] rounded-full"></div>
                        <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: `radial-gradient(circle, #fff 1px, transparent 1px)`, backgroundSize: '40px 40px' }}></div>
                    </div>

                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-cyan-500 flex items-center justify-center rounded font-black text-black text-xl neon-glow">JN</div>
                                <div className="hidden sm:block">
                                    <div className="text-sm font-black tracking-tighter text-white">JASON NESTER</div>
                                    <div className="text-[9px] font-bold tracking-[0.2em] text-cyan-400 uppercase">Creative Systems Designer</div>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-8 text-[10px] font-black uppercase tracking-widest text-slate-400">
                                {['Work', 'Expertise', 'About', 'Resume', 'Contact'].map(item => (
                                    <a key={item} href="#" className="hover:text-white transition-colors">{item}</a>
                                ))}
                                <button className="px-6 py-2 bg-cyan-500 text-black rounded font-black hover:bg-cyan-400 transition-all">Let's Talk</button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Layout */}
                    <main className="max-w-7xl mx-auto px-6 pt-32 pb-20">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16">
                            
                            {/* Left Column */}
                            <div className="lg:col-span-8 space-y-20 lg:space-y-24">
                                
                                {/* Hero Section */}
                                <section className="relative">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full glass text-[9px] font-black uppercase tracking-widest text-slate-400 mb-8 border border-white/10">
                                        <span>Systems Thinker</span>
                                        <div className="w-1 h-1 bg-cyan-500 rounded-full"></div>
                                        <span className="text-white">Designer</span>
                                        <div className="w-1 h-1 bg-cyan-500 rounded-full"></div>
                                        <span>Developer</span>
                                    </div>

                                    <h1 className="text-5xl md:text-7xl font-black leading-[1.05] mb-8">
                                        I DESIGN <span className="gradient-text">SCALABLE</span><br />
                                        <span className="brand-gradient uppercase">Digital Experiences</span>
                                    </h1>

                                    <p className="max-w-xl text-lg text-slate-400 leading-relaxed mb-10">
                                        Creative Strategist & UX Designer building brand systems, digital products, and narrative-driven solutions that convert.
                                    </p>

                                    <div className="flex flex-wrap gap-4 mb-16">
                                        <button className="px-8 py-4 bg-cyan-500 text-black font-black rounded-lg flex items-center gap-2 hover:bg-cyan-400 transition-all">
                                            View Case Studies <Icons.ArrowRight />
                                        </button>
                                        <button className="px-8 py-4 glass text-white font-black rounded-lg flex items-center gap-2 hover:bg-white/10 transition-all">
                                            <Icons.Behance /> View Behance
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-3 gap-8 max-w-lg border-t border-white/5 pt-10">
                                        {[{v: "21+", l: "Years", s: "Web & Dev"}, {v: "20+", l: "Years", s: "Art & Illustration"}, {v: "100+", l: "Projects", s: "Delivered"}].map((stat, i) => (
                                            <div key={i}>
                                                <div className="text-3xl font-black text-white">{stat.v}</div>
                                                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{stat.l} / {stat.s}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="absolute top-0 right-0 hidden xl:block w-72 h-96 -translate-y-10 group">
                                        <div className="w-full h-full glass rounded-3xl overflow-hidden border border-white/10 relative">
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                                            <div className="w-full h-full flex items-center justify-center text-9xl opacity-20 grayscale transition-all">👤</div>
                                            <div className="absolute bottom-8 left-8">
                                                <div className="text-xs font-black text-cyan-400 uppercase tracking-widest">Jason Nester</div>
                                                <div className="text-[10px] text-slate-500 uppercase">Lead Systems Designer</div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* Featured Work Section */}
                                <section id="work">
                                    <div className="flex items-center justify-between mb-8">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-white">Featured Work</h3>
                                        <a href="#" className="text-[10px] font-bold uppercase tracking-widest text-cyan-400 flex items-center gap-1 hover:underline">
                                            View All Projects <Icons.ChevronRight />
                                        </a>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {featuredWork.map((work) => (
                                            <div 
                                                key={work.id} 
                                                onClick={() => setSelectedProject(work)}
                                                className={`group relative ${work.isMain ? 'md:col-span-2 h-80' : 'h-64'} rounded-2xl overflow-hidden glass border border-white/10 cursor-pointer active:scale-95 transition-all`}
                                            >
                                                <div className={`absolute inset-0 bg-gradient-to-br ${work.color} to-transparent opacity-40 group-hover:opacity-60 transition-all`}></div>
                                                <div className="absolute inset-0 work-card-overlay p-8 flex flex-col justify-end">
                                                    {work.category && (
                                                        <div className="text-[10px] font-black text-cyan-400 mb-2 uppercase tracking-widest">{work.category}</div>
                                                    )}
                                                    <h4 className={`${work.isMain ? 'text-3xl' : 'text-xl'} font-black text-white mb-2`}>{work.title}</h4>
                                                    <p className="text-slate-400 text-sm">{work.subtitle}</p>
                                                    {work.isMain && (
                                                        <button className="mt-4 w-fit px-5 py-2 glass rounded-lg text-xs font-black uppercase tracking-widest flex items-center gap-2 group-hover:bg-cyan-500 group-hover:text-black transition-all">
                                                            Explore Case Study <Icons.ArrowRight />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* Portfolio Gallery Tabs Section */}
                                <section>
                                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-white">Project Archive</h3>
                                        <div className="flex gap-2 p-1 glass rounded-xl border border-white/5">
                                            {galleryCategories.map((cat) => (
                                                <button
                                                    key={cat}
                                                    onClick={() => setActiveTab(cat)}
                                                    className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all ${
                                                        activeTab === cat 
                                                        ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20' 
                                                        : 'text-slate-500 hover:text-white'
                                                    }`}
                                                >
                                                    {cat}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 animate-fade-in" key={activeTab}>
                                        {galleryItems[activeTab].map((item, i) => (
                                            <div key={i} className="group glass p-6 rounded-2xl border border-white/5 hover:border-white/20 transition-all cursor-pointer flex flex-col items-center justify-center text-center relative overflow-hidden h-44">
                                                <div className="absolute inset-0 bg-gradient-to-br from-white/[0.03] to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                                <div className="text-slate-600 group-hover:text-cyan-400 transition-colors mb-4 scale-125">
                                                    {item.icon}
                                                </div>
                                                <h5 className="text-[11px] font-black uppercase tracking-widest text-white mb-1">{item.title}</h5>
                                                <p className="text-[10px] text-slate-500 uppercase font-bold group-hover:text-cyan-500/70 transition-colors">{item.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* Process Visualizer */}
                                <section className="glass rounded-[2rem] p-10 border border-white/5 relative overflow-hidden">
                                    <div className="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent blur-md"></div>
                                    <div className="text-center mb-10">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-cyan-500 mb-2 uppercase">My Process</h3>
                                        <div className="h-px w-20 bg-white/10 mx-auto"></div>
                                    </div>
                                    <div className="flex flex-col md:flex-row gap-4">
                                        {processSteps.map((step, i) => (
                                            <div 
                                                key={i} 
                                                onClick={() => setActiveProcess(i)}
                                                className={`flex-1 p-4 rounded-xl border transition-all cursor-pointer text-center ${
                                                    activeProcess === i 
                                                    ? 'bg-cyan-500/10 border-cyan-500 text-white' 
                                                    : 'bg-white/5 border-transparent text-slate-500 hover:border-white/10'
                                                }`}
                                            >
                                                <div className="text-[9px] font-bold mb-1 opacity-50">0{i+1}</div>
                                                <div className="text-[11px] font-black uppercase tracking-widest">{step}</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>

                            {/* Sidebar Column */}
                            <aside className="lg:col-span-4 space-y-12">
                                <div className="space-y-6">
                                    <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-white flex items-center gap-4">
                                        Core <span className="text-cyan-400">Expertise</span>
                                        <div className="flex-1 h-px bg-white/10"></div>
                                    </h3>
                                    <div className="space-y-3">
                                        {expertise.map((item, i) => (
                                            <div key={i} className="glass p-4 rounded-xl flex items-center justify-between group hover:bg-white/5 transition-all cursor-pointer">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center">
                                                        <span className={item.color}>{item.icon}</span>
                                                    </div>
                                                    <span className="text-[11px] font-black uppercase tracking-widest text-slate-300 group-hover:text-white transition-colors">{item.title}</span>
                                                </div>
                                                <Icons.ChevronRight />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass p-8 rounded-[2rem] border border-white/5 space-y-6">
                                    <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-white">About <span className="text-cyan-400">Jason</span></h3>
                                    <p className="text-sm text-slate-400 leading-relaxed">
                                        Creative Systems Designer with <span className="text-cyan-400 font-bold">21+ years</span> of experience turning complex ideas into <span className="text-white font-bold italic">seamless digital ecosystems.</span>
                                    </p>
                                    <div className="space-y-3">
                                        <div className="flex flex-wrap gap-x-6 gap-y-3">
                                            {['Strategy', 'Design', 'Development'].map(tag => (
                                                <div key={tag} className="flex items-center gap-2 text-[9px] font-black uppercase tracking-widest text-slate-500">
                                                    <div className="w-1.5 h-1.5 bg-cyan-500 rounded-full"></div> {tag}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="relative group cursor-pointer aspect-video rounded-[2rem] overflow-hidden glass border border-white/10 flex items-center justify-center">
                                    <div className="absolute inset-0 bg-gradient-to-br from-cyan-500/10 to-transparent"></div>
                                    <div className="relative z-10 flex flex-col items-center gap-3">
                                        <div className="w-14 h-14 rounded-full bg-cyan-500/20 flex items-center justify-center border border-cyan-500/40 group-hover:scale-110 transition-all">
                                            <Icons.Play fill="#06b6d4" />
                                        </div>
                                        <span className="text-[9px] font-black uppercase tracking-[0.3em] text-white">Play Showreel</span>
                                    </div>
                                </div>
                            </aside>
                        </div>
                    </main>

                    {/* Case Study Modal */}
                    {selectedProject && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay">
                            <div className="w-full max-w-4xl glass rounded-[2.5rem] border border-white/10 overflow-hidden relative animate-fade-in">
                                <div className="p-8 pb-0 flex justify-between items-start">
                                    <div>
                                        <div className="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2">Detailed Case Study</div>
                                        <h2 className="text-4xl font-black text-white">{selectedProject.title}</h2>
                                        <p className="text-slate-400 mt-2">{selectedProject.subtitle}</p>
                                    </div>
                                    <button 
                                        onClick={() => setSelectedProject(null)}
                                        className="p-3 glass rounded-full hover:bg-white/10 text-white transition-all"
                                    >
