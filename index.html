<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Nester | Creative Systems Designer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-text { text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, cloneElement } = React;
        const { 
            ChevronRight, Layout, Layers, Globe, Play, Monitor, 
            Cpu, Palette, Box, ArrowRight, Menu, X, 
            ExternalLink, MessageSquare 
        } = lucideReact;

        const BehanceIcon = ({ size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M9 12a2 2 0 0 0-2-2H5v4h2a2 2 0 0 0 2-2z" />
                <path d="M5 10V7h3a2 2 0 0 1 2 2v1" />
                <path d="M13 14h5" />
                <path d="M18 11a3 3 0 1 0-6 0v3h6Z" />
                <path d="M2 13V6h6a4 4 0 0 1 0 8H2Z" />
                <path d="M14 8h4" />
            </svg>
        );

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [activeProcess, setActiveProcess] = useState(2);

            const expertise = [
                { title: "UX & Product Design", icon: <Layout className="w-5 h-5 text-cyan-400" /> },
                { title: "Brand Architecture", icon: <Layers className="w-5 h-5 text-purple-400" /> },
                { title: "Web & Digital Systems", icon: <Globe className="w-5 h-5 text-blue-400" /> },
                { title: "Multimedia & Storytelling", icon: <Palette className="w-5 h-5 text-pink-400" /> },
                { title: "AI-Enhanced Workflows", icon: <Cpu className="w-5 h-5 text-cyan-500" /> },
            ];

            const processSteps = ["Discovery", "Strategy", "UX & Design", "Build & Launch", "Optimize"];

            return (
                <div className="min-h-screen bg-[#020617] text-slate-200 overflow-x-hidden selection:bg-cyan-500/30">
                    {/* Floating Background Effects */}
                    <div className="fixed top-0 left-0 w-full h-full pointer-events-none -z-10">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 blur-[120px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-600/10 blur-[120px] rounded-full"></div>
                    </div>

                    {/* Navbar */}
                    <nav className="fixed top-0 w-full z-50 bg-[#020617]/80 backdrop-blur-md border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-cyan-500 flex items-center justify-center rounded font-bold text-black text-xl shadow-[0_0_15px_rgba(6,182,212,0.3)]">JN</div>
                                <div className="hidden sm:block">
                                    <h1 className="text-lg font-bold text-white leading-none">JASON NESTER</h1>
                                    <p className="text-[10px] uppercase tracking-widest text-cyan-400 font-medium">Creative Systems Designer</p>
                                </div>
                            </div>
                            <div className="hidden md:flex items-center gap-8 text-[11px] font-bold uppercase tracking-widest">
                                {['Work', 'Expertise', 'About', 'Contact'].map(item => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="text-slate-400 hover:text-cyan-400 transition-colors">{item}</a>
                                ))}
                                <button className="px-6 py-2 rounded bg-cyan-500 text-black hover:bg-cyan-400 transition-all font-black">Let's Talk</button>
                            </div>
                            <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="md:hidden text-white"><Menu /></button>
                        </div>
                    </nav>

                    {/* Hero */}
                    <main className="max-w-7xl mx-auto px-6 pt-32 pb-20">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                            <div className="lg:col-span-8 space-y-24">
                                <section>
                                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-white/10 bg-white/5 text-[10px] font-bold tracking-widest uppercase text-slate-400 mb-8">
                                        <span>Systems Thinker</span>
                                        <div className="w-1 h-1 bg-cyan-500 rounded-full"></div>
                                        <span className="text-white">Designer</span>
                                        <div className="w-1 h-1 bg-cyan-500 rounded-full"></div>
                                        <span>Developer</span>
                                    </div>
                                    <h2 className="text-5xl md:text-7xl font-extrabold text-white leading-[1.1] mb-8">
                                        I DESIGN <span className="text-transparent bg-clip-text bg-gradient-to-r from-white to-white/30">SCALABLE</span><br />
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-400 to-purple-500">DIGITAL EXPERIENCES</span>
                                    </h2>
                                    <p className="max-w-xl text-lg text-slate-400 leading-relaxed mb-12">
                                        Creative Strategist & UX Designer building brand systems, digital products, and narrative-driven solutions that convert.
                                    </p>
                                    <div className="flex flex-wrap gap-4">
                                        <button className="px-8 py-4 bg-cyan-500 text-black font-black rounded-lg flex items-center gap-2 hover:bg-cyan-400 transition-all shadow-lg shadow-cyan-500/20">
                                            View Case Studies <ArrowRight size={18} />
                                        </button>
                                        <button className="px-8 py-4 glass text-white font-black rounded-lg flex items-center gap-2 hover:bg-white/10 transition-all">
                                            <Play size={18} fill="currentColor" /> View Behance
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-3 gap-8 max-w-lg border-t border-white/10 pt-10 mt-12">
                                        {[{v: "21+", l: "Years", s: "Web & Dev"}, {v: "20+", l: "Years", s: "Art & Illustration"}, {v: "100+", l: "Projects", s: "Delivered"}].map((stat, i) => (
                                            <div key={i}>
                                                <div className="text-3xl font-bold text-white">{stat.v} <span className="text-xs font-medium text-slate-500 block uppercase tracking-tighter">{stat.l}</span></div>
                                                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">{stat.s}</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* Process */}
                                <section className="glass rounded-3xl p-8 md:p-12">
                                    <div className="text-center mb-12">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-cyan-400 mb-2">My Design Process</h3>
                                        <div className="h-px w-20 bg-cyan-500/30 mx-auto"></div>
                                    </div>
                                    <div className="flex flex-wrap md:flex-nowrap justify-between items-center gap-4">
                                        {processSteps.map((step, i) => (
                                            <div key={i} onClick={() => setActiveProcess(i)} className={`flex-1 text-center py-4 px-2 rounded-xl border transition-all cursor-pointer ${activeProcess === i ? 'bg-cyan-500/10 border-cyan-500 text-cyan-400 shadow-[0_0_20px_rgba(6,182,212,0.1)]' : 'bg-transparent border-white/5 text-slate-500'}`}>
                                                <div className="text-[9px] font-bold mb-1 opacity-50">STEP 0{i+1}</div>
                                                <div className="text-[11px] font-black uppercase tracking-widest">{step}</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>

                            {/* Sidebar */}
                            <aside className="lg:col-span-4 space-y-12">
                                <div className="space-y-6">
                                    <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-white flex items-center gap-3">
                                        Core <span className="text-cyan-400">Expertise</span>
                                        <div className="flex-1 h-px bg-white/10"></div>
                                    </h3>
                                    <div className="space-y-3">
                                        {expertise.map((item, i) => (
                                            <div key={i} className="flex items-center justify-between p-4 rounded-xl glass hover:bg-white/5 transition-all group cursor-pointer">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center group-hover:scale-110 transition-transform">
                                                        {item.icon}
                                                    </div>
                                                    <span className="text-xs font-bold uppercase tracking-widest text-slate-300 group-hover:text-white">{item.title}</span>
                                                </div>
                                                <ChevronRight size={16} className="text-slate-600 group-hover:text-cyan-400 transition-colors" />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="p-8 rounded-3xl glass space-y-6">
                                    <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-white">About Jason</h3>
                                    <p className="text-sm text-slate-400 leading-relaxed">
                                        Creative Systems Designer with <span className="text-cyan-400 font-bold">21+ years</span> of experience turning complex ideas into <span className="text-white font-bold italic">seamless digital ecosystems.</span>
                                    </p>
                                    <div className="grid grid-cols-2 gap-4">
                                        {['Strategy', 'Design', 'Development', 'Scalable'].map(tag => (
                                            <div key={tag} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-slate-500">
                                                <div className="w-1 h-1 bg-cyan-500 rounded-full"></div> {tag}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </aside>
                        </div>

                        {/* Footer CTA */}
                        <section className="mt-32 p-12 md:p-24 rounded-[3rem] glass relative overflow-hidden text-center md:text-left flex flex-col md:flex-row items-center justify-between gap-12">
                            <div className="relative z-10 max-w-xl">
                                <h2 className="text-4xl md:text-6xl font-black text-white mb-6 uppercase tracking-tight">LET'S BUILD <span className="text-cyan-400">SOMETHING</span> MEANINGFUL</h2>
                                <p className="text-slate-400 text-lg">Ready to collaborate? Let's talk about your next project or solve a specific system problem.</p>
                            </div>
                            <button className="relative z-10 px-12 py-6 bg-cyan-500 text-black font-black text-xl rounded-2xl hover:bg-cyan-400 transition-all shadow-xl shadow-cyan-500/20">Start a Project</button>
                        </section>
                    </main>

                    <footer className="max-w-7xl mx-auto px-6 py-12 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 opacity-50">
                        <div className="text-[10px] font-bold uppercase tracking-widest">© 2024 Jason Nester | Systems Designer</div>
                        <div className="flex gap-6">
                            <MessageSquare size={18} className="hover:text-cyan-400 cursor-pointer" />
                            <BehanceIcon size={18} className="hover:text-purple-400 cursor-pointer" />
                            <ExternalLink size={18} className="hover:text-blue-400 cursor-pointer" />
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
